<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://pro.fontawesome.com/releases/v5.10.0/css/all.css" integrity="sha384-AYmEC3Yw5cVb3ZcuHtOA93w35dYTsvhLPVnYs9eStHfGJvOvKxVfELGroGkvsg+p" crossorigin="anonymous" />
    <link rel="stylesheet" href="css/styleFormulario.css">
    <link rel="shortcut icon" type="imagex/png" href="imagens/logo.png">
    <title>Login</title>
</head>
<body>
    <div class="container">
        <div class="signin-signup">
            <form action="" class="sign-in-form">
                <h2 class="title">Login</h2>
                <div class="input-field">
                    <i class="fas fa-user"></i>
                    <input type="text" placeholder="Email">
                </div>
                <div class="input-field">
                    <i class="fas fa-lock"></i>
                    <input type="password" placeholder="Senha">
                </div>
                <button onclick="entrar()" class="btn">Login</button>
            </form>
            <form action="" class="sign-up-form">
                <h2 class="title">Cadastro de Funcionário</h2>
                <div class="input-field">
                    <i class="fas fa-user"></i>
                    <input type="text" id="nomeEquipamento"placeholder="Nome">
                </div>
                <div class="input-field">
                    <i class="fas fa-lock"></i>
                    <input type="text" id="cpuVersao"placeholder="Cargo">
                </div>
                <div class="input-field">
                    <i class="fas fa-lock"></i>
                    <input type="text" id="memoriaRam"placeholder="Email">
                </div>
                <div class="input-field">
                    <i class="fas fa-lock"></i>
                    <input type="text" id="discoTotal"placeholder="Senha">
                </div>
                <div class="input-field">
                    <i class="fas fa-lock"></i>
                    <input type="text" id="sistemaOperacional"placeholder="CPF">
                </div>
                <button  onclick="cadastrar()" class="btn">Cadastrar</button>
            </form>
        </div>
        <div class="panels-container">
            <div class="panel left-panel">
                <div class="content">
                    <h3>Já possui uma conta?</h3>
                    <p>Se redirecione para o outro formuário clicando no botão abaixo para fazer seu login</p>
                    <button class="btn" id="sign-in-btn">Clique aqui</button>
                </div>
                <img src="imagens/logo.png" alt="" class="image">
            </div>
            <div class="panel right-panel">
                <div class="content">
                    <h3>Não possui uma conta?</h3>
                    <p>Peça para que um Administrador do sistema peça um Login!</p>
                    <button class="btn" id="sign-up-btn">Clique aqui</button>
                </div>
                <img src="imagens/logo.png" alt="" class="image">
            </div>
        </div>
    </div>
    <script src="js/animacao.js"></script>
</body>
</html>

<script>

    function dash(){
        window.location = "./dashs.html"
    }

    function entrar() {
        aguardar();

        var emailVar = input_email.value;
        var senhaVar = input_senha.value;

        if (emailVar == "" || senhaVar == "") {
            cardErro.style.display = "block"
            mensagem_erro.innerHTML = "(Mensagem de erro para todos os campos em branco)";
            finalizarAguardar();
            return false;
        }
        else {
            setInterval(sumirMensagem, 5000)
        }

        console.log("FORM LOGIN: ", emailVar);
        console.log("FORM SENHA: ", senhaVar);

        fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: emailVar,
                senhaServer: senhaVar
            })
        }).then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!")

            if (resposta.ok) {
                console.log(resposta);

                resposta.json().then(json => {
                    console.log(json);
                    console.log(JSON.stringify(json));
                    sessionStorage.EMAIL_USUARIO = json.email;
                    sessionStorage.NOME_USUARIO = json.nome;
                    sessionStorage.ID_USUARIO = json.id;
                    sessionStorage.AQUARIOS = JSON.stringify(json.aquarios)

                    setTimeout(function () {
                        window.location = "./dashboard/cards.html";
                    }, 1000); // apenas para exibir o loading

                });

            } else {

                console.log("Houve um erro ao tentar realizar o login!");

                resposta.text().then(texto => {
                    console.error(texto);
                    finalizarAguardar(texto);
                });
            }

        }).catch(function (erro) {
            console.log(erro);
        })

        return false;
    }
